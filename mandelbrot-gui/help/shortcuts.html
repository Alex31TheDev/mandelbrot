<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Shortcuts</title>
    <link rel="stylesheet" href="help.css">
</head>
<body>
    <div class="page">
        <div class="crumbs"><a href="index.html">Help</a> / Shortcuts</div>
        <h1>Shortcuts</h1>
        <p class="lead">Shortcuts can be changed in <strong>Settings</strong>. Defaults:</p>
        <table class="shortcut-table">
            <tr><td><code>Esc</code></td><td>Cancel render</td></tr>
            <tr><td><code>H</code></td><td>Home</td></tr>
            <tr><td><code>Z</code></td><td>Cycle mode</td></tr>
            <tr><td><code>G</code></td><td>Cycle grid</td></tr>
            <tr><td><code>F1</code></td><td>Overlay</td></tr>
            <tr><td><code>F2</code></td><td>Quick save</td></tr>
            <tr><td><code>F12</code></td><td>Fullscreen</td></tr>
            <tr><td><code>Ctrl+R</code></td><td>Calculate</td></tr>
            <tr><td><code>Ctrl+S</code></td><td>Save image</td></tr>
            <tr><td><code>Ctrl+O</code></td><td>Open view</td></tr>
            <tr><td><code>Ctrl+Shift+S</code></td><td>Save view</td></tr>
            <tr><td><code>Ctrl+,</code></td><td>Settings</td></tr>
            <tr><td><code>Ctrl+Q</code></td><td>Exit</td></tr>
        </table>
    </div>
</body>
</html>
